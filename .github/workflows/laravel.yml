name: Laravel CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Mengambil kode dari repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM dependencies and Build
      run: |
        npm install
        npm run build

    # 1. Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
        coverage: none

    # 2. Install package Laravel pake Composer
    - name: Install dependencies (Composer)
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    # 3. Setup .env dan App Key
    - name: Setup file .env
      run: cp .env.example .env

    - name: Generate App Key
      run: php artisan key:generate

    - name: Prepare Storage Directories
      run: |
        mkdir -p storage/framework/cache/data
        mkdir -p storage/framework/sessions
        mkdir -p storage/framework/views

    # 4. Bikin database SQLite untuk testing dan Migrate
    - name: Buat Database SQLite untuk Testing
      run: |
        mkdir -p database
        touch database/database.sqlite
        php artisan migrate --force

    # 5. Eksekusi file testing lu
    - name: Jalankan Testing (PHPUnit / Pest)
      run: php artisan test
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Hanya jalan kalau nge-push ke main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Ganti raga jadi user CloudPanel biar dapet akses penuh dan ga kena Permission Denied
          sudo -i -u muhaqieladhirajendra bash << 'EOF'
          
          # Berhenti otomatis jika ada perintah yang error
          set -e
          
          # Load profil environment agar perintah 'npm' dan 'php' bisa terbaca
          if [ -f ~/.bashrc ]; then source ~/.bashrc; fi
          if [ -s "$HOME/.nvm/nvm.sh" ]; then source "$HOME/.nvm/nvm.sh"; fi
          export PATH=$PATH:/usr/local/bin:/usr/bin
          
          # path server
          cd /home/muhaqieladhirajendra/htdocs/muhaqieladhirajendra.dev
          
          # Cek apakah folder ini sudah jadi git repo
          if [ ! -d ".git" ]; then
            echo "Git belum diinisialisasi. Melakukan setup awal..."
            git init
            
            git remote add origin https://github.com/MuhAqielAdhiRajendra/Toko_CemalCemol.git
            
            git fetch --all
            # Force timpa file bawaan CloudPanel (kayak index.php default) pakai kode lu
            git reset --hard origin/main
            git branch -m main
          else
            echo "Git sudah siap, menarik kode terbaru..."
            git reset --hard origin/main
            git pull origin main
          fi
          
          # Install library backend (tanpa paket dev) dan skip scripts bawaan agar tidak bentrok dengan package dev yang dihapus
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --no-scripts
          
          # Hapus cache lama agar Laravel tidak mencoba meload package dev yang baru saja dihapus
          rm -f bootstrap/cache/*.php
          
          # Setelah install berhasil dan cache bersih, jalankan ulang package discover manual
          php artisan package:discover --ansi
          
          # Install library frontend dan build
          npm install
          npm run build
          
          # Jalankan migrasi database
          php artisan migrate --force
          
          # Clear dan re-cache config, route, dan view
          php artisan optimize:clear
          php artisan optimize
          
          EOF
