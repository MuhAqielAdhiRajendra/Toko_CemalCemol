name: Laravel CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Mengambil kode dari repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM dependencies and Build
      run: |
        npm install
        npm run build

    # 1. Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
        coverage: none

    # 2. Install package Laravel pake Composer
    - name: Install dependencies (Composer)
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    # 3. Setup .env dan App Key
    - name: Setup file .env
      run: cp .env.example .env

    - name: Generate App Key
      run: php artisan key:generate

    # 4. Bikin database SQLite untuk testing dan Migrate
    - name: Buat Database SQLite untuk Testing
      run: |
        mkdir -p database
        touch database/database.sqlite
        php artisan migrate --force

    # 5. Eksekusi file testing lu
    - name: Jalankan Testing (PHPUnit / Pest)
      run: php artisan test
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite