stages:
  - deploy

deploy_production:
  stage: deploy
  # Kita pakai image Node supaya bisa npm install & vite build
  image: node:20-alpine
  tags:
    - azure-runner
  before_script:
    # Instal OpenSSH & Rsync di dalam container Node Alpine
    - apk add --no-cache openssh-client rsync
    # Setup SSH Key
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - echo "1. Menginstal dependensi Node.js & Build Assets Vite..."
    - npm install
    - npm run build
    
    - echo "2. Transfer kodingan (termasuk hasil build) ke Azure VM via Rsync..."
    # Rsync langsung kirim kodingan dari Runner ke Azure, tanpa mampir ke GitLab Artifacts!
    - rsync -avz --exclude='.git' --exclude='node_modules' --exclude='/storage' --exclude='.env' ./ $SERVER_USER@$SERVER_HOST:/var/www/muhaqieladhirajendra.dev/
    
    - echo "3. Menjalankan Command Laravel di dalam Azure VM via SSH..."
    - ssh $SERVER_USER@$SERVER_HOST "
        cd /var/www/muhaqieladhirajendra.dev &&
        
        echo 'Menginstal dependensi PHP...' &&
        composer install --optimize-autoloader --no-dev &&
        
        echo 'Konfigurasi .env...' &&
        if [ ! -f .env ]; then cp .env.example .env; php artisan key:generate; fi &&
        
        echo 'Migrasi Database...' &&
        php artisan migrate --force &&
        
        echo 'Membuat Storage Link...' &&
        php artisan storage:link || true &&
        
        echo 'Optimasi Cache Laravel...' &&
        php artisan optimize:clear &&
        php artisan optimize &&
        
        echo 'Mengatur permission folder...' &&
        (chown -R www-data:www-data /var/www/muhaqieladhirajendra.dev || sudo chown -R www-data:www-data /var/www/muhaqieladhirajendra.dev || true) &&
        (chmod -R 777 storage bootstrap/cache || sudo chmod -R 777 storage bootstrap/cache)
      "
    - echo "Deploy Sukses tanpa drama Artifacts!"
  only:
    - main